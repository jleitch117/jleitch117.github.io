<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Half Marathon Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e10;
    --surface: #141619;
    --card: #1a1d21;
    --border: #2a2d32;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0ee;
    --muted: #6b7280;
    --done: #22c55e;
    --base: #4ade80;
    --build: #60a5fa;
    --recovery: #fbbf24;
    --peak: #f87171;
    --taper: #c084fc;
    --rebuild: #34d399;
    --race: #ff6b35;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(--bg);
color: var(--text);
min-height: 100vh;
}

/* HEADER */
.hero {
position: relative;
padding: 48px 32px 32px;
border-bottom: 1px solid var(--border);
overflow: hidden;
}

.hero::before {
content: ‘’;
position: absolute;
top: -80px; right: -80px;
width: 400px; height: 400px;
background: radial-gradient(circle, rgba(232,255,71,0.08) 0%, transparent 70%);
pointer-events: none;
}

.hero-top {
display: flex;
justify-content: space-between;
align-items: flex-start;
flex-wrap: wrap;
gap: 24px;
max-width: 1400px;
margin: 0 auto;
}

.hero h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(48px, 7vw, 88px);
line-height: 0.95;
letter-spacing: 2px;
color: var(--text);
}

.hero h1 span { color: var(--accent); }

.hero-meta {
display: flex;
flex-direction: column;
align-items: flex-end;
gap: 8px;
}

.race-countdown {
font-family: ‘DM Mono’, monospace;
font-size: 13px;
color: var(--muted);
text-align: right;
}

.race-countdown strong {
display: block;
font-size: 28px;
font-family: ‘Bebas Neue’, sans-serif;
color: var(–accent2);
letter-spacing: 1px;
}

/* PROGRESS BAR */
.progress-section {
max-width: 1400px;
margin: 24px auto 0;
padding: 0;
}

.progress-stats {
display: flex;
gap: 32px;
margin-bottom: 12px;
flex-wrap: wrap;
}

.stat {
display: flex;
flex-direction: column;
gap: 2px;
}

.stat-num {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 32px;
line-height: 1;
color: var(--accent);
}

.stat-label {
font-size: 11px;
color: var(--muted);
text-transform: uppercase;
letter-spacing: 1px;
font-family: ‘DM Mono’, monospace;
}

.progress-bar-wrap {
height: 6px;
background: var(--border);
border-radius: 3px;
overflow: hidden;
}

.progress-bar-fill {
height: 100%;
background: linear-gradient(90deg, var(--accent), var(--accent2));
border-radius: 3px;
transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* MAIN LAYOUT */
.main {
max-width: 1400px;
margin: 0 auto;
padding: 32px;
}

/* FILTER TABS */
.filters {
display: flex;
gap: 8px;
flex-wrap: wrap;
margin-bottom: 28px;
}

.filter-btn {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 1px;
text-transform: uppercase;
padding: 7px 16px;
border-radius: 2px;
border: 1px solid var(--border);
background: transparent;
color: var(--muted);
cursor: pointer;
transition: all 0.15s;
}

.filter-btn:hover, .filter-btn.active {
border-color: var(--accent);
color: var(--accent);
background: rgba(232,255,71,0.05);
}

/* WEEK CARDS */
.weeks-grid {
display: flex;
flex-direction: column;
gap: 4px;
}

.week-card {
background: var(--card);
border: 1px solid var(--border);
border-radius: 4px;
overflow: hidden;
transition: border-color 0.15s;
}

.week-card:hover { border-color: #3a3d44; }

.week-card.completed { border-left: 3px solid var(--done); }
.week-card.current { border-left: 3px solid var(--accent); }

.week-header {
display: grid;
grid-template-columns: 60px 160px 110px 1fr auto;
align-items: center;
gap: 16px;
padding: 14px 20px;
cursor: pointer;
user-select: none;
}

.week-num {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
color: var(--muted);
line-height: 1;
}

.week-card.current .week-num { color: var(--accent); }
.week-card.completed .week-num { color: var(--done); }

.week-dates {
font-family: ‘DM Mono’, monospace;
font-size: 12px;
color: var(--muted);
}

.phase-tag {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 1px;
text-transform: uppercase;
padding: 3px 10px;
border-radius: 2px;
font-weight: 500;
}

.week-mini-progress {
display: flex;
gap: 6px;
align-items: center;
}

.run-dot {
width: 10px; height: 10px;
border-radius: 50%;
border: 1.5px solid var(--border);
background: transparent;
transition: all 0.2s;
}

.run-dot.done { background: var(--done); border-color: var(--done); }

.chevron {
width: 20px; height: 20px;
color: var(--muted);
transition: transform 0.2s;
flex-shrink: 0;
}

.week-card.open .chevron { transform: rotate(180deg); }

/* WEEK BODY */
.week-body {
display: none;
padding: 0 20px 20px;
border-top: 1px solid var(--border);
}

.week-card.open .week-body { display: block; }

.runs-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 12px;
margin-top: 16px;
}

@media (max-width: 700px) {
.runs-grid { grid-template-columns: 1fr; }
.week-header { grid-template-columns: 50px 1fr auto; }
.week-dates, .phase-tag { display: none; }
}

.run-card {
background: var(--surface);
border: 1.5px solid var(--border);
border-radius: 4px;
padding: 16px;
cursor: pointer;
transition: all 0.15s;
position: relative;
overflow: hidden;
}

.run-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
opacity: 0;
transition: opacity 0.2s;
}

.run-card.easy::before { background: var(--base); }
.run-card.tempo::before { background: var(--build); }
.run-card.long::before { background: var(--accent2); }

.run-card:hover { border-color: #3a3d44; }
.run-card:hover::before { opacity: 1; }

.run-card.checked {
border-color: rgba(34,197,94,0.4);
background: rgba(34,197,94,0.04);
}

.run-card.checked::before { opacity: 1; background: var(--done) !important; }

.run-type-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(--muted);
margin-bottom: 8px;
}

.run-card.easy .run-type-label { color: var(--base); }
.run-card.tempo .run-type-label { color: var(--build); }
.run-card.long .run-type-label { color: var(--accent2); }

.run-description {
font-size: 15px;
font-weight: 500;
line-height: 1.4;
margin-bottom: 14px;
}

.run-card.checked .run-description {
text-decoration: line-through;
color: var(--muted);
}

.run-check-btn {
display: flex;
align-items: center;
gap: 8px;
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 0.5px;
color: var(--muted);
transition: color 0.15s;
}

.run-card.checked .run-check-btn { color: var(--done); }

.check-icon {
width: 18px; height: 18px;
border: 1.5px solid var(--border);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
flex-shrink: 0;
}

.run-card.checked .check-icon {
background: var(--done);
border-color: var(--done);
}

.check-icon svg { opacity: 0; transition: opacity 0.15s; }
.run-card.checked .check-icon svg { opacity: 1; }

.week-note {
margin-top: 14px;
padding: 12px 16px;
background: rgba(255,255,255,0.02);
border-left: 2px solid var(--border);
font-size: 13px;
color: var(--muted);
line-height: 1.5;
font-style: italic;
border-radius: 0 2px 2px 0;
}

/* Phase colors */
.phase-Base       { background: rgba(74,222,128,0.12); color: var(--base); }
.phase-Build      { background: rgba(96,165,250,0.12); color: var(--build); }
.phase-Recovery   { background: rgba(251,191,36,0.12); color: var(--recovery); }
.phase-Peak       { background: rgba(248,113,113,0.12); color: var(--peak); }
.phase-Taper      { background: rgba(192,132,252,0.12); color: var(--taper); }
.phase-Rebuild    { background: rgba(52,211,153,0.12); color: var(--rebuild); }
.phase-RACE       { background: rgba(255,107,53,0.2); color: var(--race); }

/* Toast */
.toast {
position: fixed;
bottom: 32px; right: 32px;
background: var(--card);
border: 1px solid var(--done);
border-radius: 4px;
padding: 14px 20px;
font-family: ‘DM Mono’, monospace;
font-size: 13px;
color: var(--done);
opacity: 0;
transform: translateY(12px);
transition: all 0.3s;
pointer-events: none;
z-index: 100;
}

.toast.show {
opacity: 1;
transform: translateY(0);
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.hero-divider {
width: 40px; height: 2px;
background: var(--accent);
margin: 12px 0;
}

.subtitle {
font-size: 14px;
color: var(--muted);
font-family: ‘DM Mono’, monospace;
}
</style>

</head>
<body>

<div class="hero">
  <div class="hero-top">
    <div>
      <div class="subtitle">// training log</div>
      <h1>HALF<br><span>MARATHON</span></h1>
      <div class="hero-divider"></div>
      <div class="subtitle">Mar 9 → Nov 14, 2026 &nbsp;·&nbsp; 36 weeks &nbsp;·&nbsp; 3×/week</div>
    </div>
    <div class="hero-meta">
      <div class="race-countdown">
        <strong id="days-left">—</strong>
        days to race day
      </div>
      <div id="sync-badge" style="font-family:'DM Mono',monospace;font-size:10px;color:#4ade80;text-align:right;margin-top:8px;">auto-syncs on run log</div>
    </div>
  </div>
  <div class="progress-section">
    <div class="progress-stats">
      <div class="stat">
        <span class="stat-num" id="stat-done">0</span>
        <span class="stat-label">Runs Done</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-left">108</span>
        <span class="stat-label">Remaining</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-pct">0%</span>
        <span class="stat-label">Complete</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-weeks">0</span>
        <span class="stat-label">Weeks Done</span>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="filters">
    <button class="filter-btn active" onclick="filterWeeks('all', this)">All Weeks</button>
    <button class="filter-btn" onclick="filterWeeks('current', this)">Current Week</button>
    <button class="filter-btn" onclick="filterWeeks('incomplete', this)">Incomplete</button>
    <button class="filter-btn" onclick="filterWeeks('done', this)">Completed</button>
    <button class="filter-btn" onclick="filterWeeks('Base', this)">Base</button>
    <button class="filter-btn" onclick="filterWeeks('Build', this)">Build</button>
    <button class="filter-btn" onclick="filterWeeks('Peak', this)">Peak</button>
    <button class="filter-btn" onclick="filterWeeks('Taper', this)">Taper</button>
  </div>

  <div class="weeks-grid" id="weeks-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const PLAN = [
  { week:1,  dates:"Mar 9–15",     phase:"Base",     easy:"2 miles easy",              tempo:"3 miles w/ strides",              long:"5 miles",                          note:"Start easy — every run should feel conversational" },
  { week:2,  dates:"Mar 16–22",    phase:"Base",     easy:"2.5 miles easy",            tempo:"3 miles w/ strides",              long:"5.5 miles",                        note:"Build slowly; avoid the temptation to go faster" },
  { week:3,  dates:"Mar 23–29",    phase:"Base",     easy:"3 miles easy",              tempo:"3.5 miles w/ 4×30 sec pickups",   long:"6 miles",                          note:"Introduce short accelerations on tempo day" },
  { week:4,  dates:"Mar 30–Apr 5", phase:"Recovery", easy:"2.5 miles easy",            tempo:"3 miles easy",                    long:"5 miles",                          note:"Recovery week — back off to let your body adapt" },
  { week:5,  dates:"Apr 6–12",     phase:"Build",    easy:"3 miles easy",              tempo:"4 miles w/ 2×8 min tempo",        long:"7 miles",                          note:"First real tempo efforts — aim for comfortably hard" },
  { week:6,  dates:"Apr 13–19",    phase:"Build",    easy:"3.5 miles easy",            tempo:"4 miles w/ 2×10 min tempo",       long:"7.5 miles",                        note:"Consistency is key — show up even on tired days" },
  { week:7,  dates:"Apr 20–26",    phase:"Build",    easy:"3.5 miles easy",            tempo:"4.5 miles w/ 2×12 min tempo",     long:"8 miles",                          note:"Halfway to double digits on your long run!" },
  { week:8,  dates:"Apr 27–May 3", phase:"Recovery", easy:"3 miles easy",              tempo:"3.5 miles easy",                  long:"6 miles",                          note:"Recovery week — protect your body" },
  { week:9,  dates:"May 4–10",     phase:"Build",    easy:"4 miles easy",              tempo:"5 miles w/ 3×10 min tempo",       long:"9 miles",                          note:"Approaching double digits — fuel and hydrate well" },
  { week:10, dates:"May 11–17",    phase:"Build",    easy:"4 miles easy",              tempo:"5 miles w/ 3×12 min tempo",       long:"10 miles",                         note:"First 10-miler! Huge milestone — celebrate it" },
  { week:11, dates:"May 18–24",    phase:"Build",    easy:"4 miles easy",              tempo:"5 miles w/ 2×15 min tempo",       long:"11 miles",                         note:"Strong week — your endurance is growing fast" },
  { week:12, dates:"May 25–31",    phase:"Recovery", easy:"3.5 miles easy",            tempo:"4 miles easy",                    long:"7 miles",                          note:"Recovery week — arrive at peak block fresh" },
  { week:13, dates:"Jun 1–7",      phase:"Peak",     easy:"4 miles easy",              tempo:"5 miles w/ 3×15 min tempo",       long:"12 miles",                         note:"Peak long run — longest you'll do before the race!" },
  { week:14, dates:"Jun 8–14",     phase:"Peak",     easy:"4 miles easy",              tempo:"5 miles w/ 2×15 min tempo",       long:"11 miles",                         note:"Stay consistent — the hard work is done" },
  { week:15, dates:"Jun 15–21",    phase:"Taper",    easy:"3.5 miles easy",            tempo:"4 miles w/ strides",              long:"8 miles",                          note:"Begin taper — reduce volume, keep intensity" },
  { week:16, dates:"Jun 22–28",    phase:"Taper",    easy:"3 miles easy",              tempo:"3 miles w/ strides",              long:"5 miles",                          note:"Trust your training — resist urge to do more" },
  { week:17, dates:"Jun 29–Jul 5", phase:"RACE",     easy:"3 miles easy",              tempo:"3 miles easy",                    long:"Race Day: Half Marathon!",         note:"Race week — sleep, hydrate, and believe in yourself" },
  { week:18, dates:"Jul 6–12",     phase:"Recovery", easy:"2 miles easy",              tempo:"REST or 2 miles easy",            long:"3 miles easy",                     note:"Post-race recovery — no pressure, just easy movement" },
  { week:19, dates:"Jul 13–19",    phase:"Rebuild",  easy:"3 miles easy",              tempo:"3 miles w/ strides",              long:"5 miles",                          note:"Ease back in — you've already run a half!" },
  { week:20, dates:"Jul 20–26",    phase:"Rebuild",  easy:"3.5 miles easy",            tempo:"4 miles w/ 2×10 min tempo",       long:"7 miles",                          note:"Fitness comes back fast — enjoy the momentum" },
  { week:21, dates:"Jul 27–Aug 2", phase:"Build",    easy:"3.5 miles easy",            tempo:"4 miles w/ 2×12 min tempo",       long:"8 miles",                          note:"Second peak block begins — stronger than before" },
  { week:22, dates:"Aug 3–9",      phase:"Recovery", easy:"3 miles easy",              tempo:"3.5 miles easy",                  long:"6 miles",                          note:"Recovery week" },
  { week:23, dates:"Aug 10–16",    phase:"Build",    easy:"4 miles easy",              tempo:"5 miles w/ 3×12 min tempo",       long:"10 miles",                         note:"Back to double digits — feels easier this time!" },
  { week:24, dates:"Aug 17–23",    phase:"Build",    easy:"4 miles easy",              tempo:"5 miles w/ 3×15 min tempo",       long:"11 miles",                         note:"Strong week — you're a different runner than March" },
  { week:25, dates:"Aug 24–30",    phase:"Peak",     easy:"4 miles easy",              tempo:"5 miles w/ 2×15 min tempo",       long:"12 miles",                         note:"Second peak — maximum fitness achieved" },
  { week:26, dates:"Aug 31–Sep 6", phase:"Peak",     easy:"4 miles easy",              tempo:"5 miles w/ 2×15 min tempo",       long:"11 miles",                         note:"Consolidate peak fitness — powerful week" },
  { week:27, dates:"Sep 7–13",     phase:"Taper",    easy:"3.5 miles easy",            tempo:"4 miles w/ 2×12 min tempo",       long:"9 miles",                          note:"Begin final taper — protect everything you've built" },
  { week:28, dates:"Sep 14–20",    phase:"Taper",    easy:"3.5 miles easy",            tempo:"4 miles w/ 1×15 min tempo",       long:"8 miles",                          note:"Fresh legs are coming — don't add extra miles" },
  { week:29, dates:"Sep 21–27",    phase:"Taper",    easy:"3 miles easy",              tempo:"3 miles w/ strides",              long:"6 miles",                          note:"You're ready — trust the work you've put in" },
  { week:30, dates:"Sep 28–Oct 4", phase:"Taper",    easy:"3 miles easy",              tempo:"3 miles w/ strides",              long:"5 miles",                          note:"Final full training week — feel strong" },
  { week:31, dates:"Oct 5–11",     phase:"Taper",    easy:"2.5 miles easy",            tempo:"2.5 miles w/ strides",            long:"4 miles",                          note:"Race week prep — stay loose, sleep extra, hydrate" },
  { week:32, dates:"Oct 12–18",    phase:"Taper",    easy:"2 miles easy",              tempo:"2 miles easy",                    long:"3 miles easy",                     note:"Final shakeout — legs feel electric. You've got this" },
  { week:33, dates:"Oct 19–25",    phase:"Taper",    easy:"2.5 miles easy",            tempo:"2 miles w/ strides",              long:"4 miles easy",                     note:"Race is in 3 weeks — stay patient" },
  { week:34, dates:"Oct 26–Nov 1", phase:"Taper",    easy:"2.5 miles easy",            tempo:"2 miles w/ 4 strides",            long:"4 miles easy",                     note:"Two weeks out — your body is storing energy" },
  { week:35, dates:"Nov 2–8",      phase:"Taper",    easy:"2 miles easy",              tempo:"2 miles easy w/ strides",         long:"3 miles easy",                     note:"Final week — rest is training now. Trust yourself" },
  { week:36, dates:"Nov 9–14",     phase:"RACE",     easy:"2 miles easy (Nov 10)",     tempo:"1.5 miles w/ strides (Nov 12)",   long:"RACE DAY: Nov 14 — Half Marathon!", note:"You made it. Run your race. Enjoy every mile." },
];

// Storage key
const STORAGE_KEY = 'hm_tracker_v1';

// JSONBin config — filled in after setup
const JSONBIN_API_KEY = '$2a$10$kwwjQjvpD3s8YQTSWlXb.ez6xuuNgehxjdsynFA5L7HROgh8Dwaiq';
const JSONBIN_BIN_ID  = '69bab815c3097a1dd537f7d7';
const JSONBIN_URL     = 'https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}

function saveState(st) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(st)); } catch(e) {}
  scheduleJsonBinSync(st);
}

function buildSyncPayload(st) {
  const done = PLAN.reduce((sum, w) =>
    sum + ['easy','tempo','long'].filter(t => !!st[`w${w.week}_${t}`]).length, 0);
  const total = PLAN.length * 3;
  const weeks = PLAN.filter(w => ['easy','tempo','long'].every(t => !!st[`w${w.week}_${t}`])).length;
  const today = new Date();
  const race = new Date('2026-11-14');
  today.setHours(0,0,0,0); race.setHours(0,0,0,0);
  const daysLeft = Math.max(0, Math.round((race - today) / 86400000));
  const curWeek = getCurrentWeek();
  const weekRuns = ['easy','tempo','long'].filter(t => !!st[`w${curWeek}_${t}`]).length;
  return { done, total, weeks, daysLeft, currentWeek: curWeek, weekRuns, lastSync: new Date().toISOString() };
}

// Debounced JSONBin push — fires 2 seconds after last run toggle
let syncTimer;
function scheduleJsonBinSync(st) {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => pushToJsonBin(st), 2000);
}

async function pushToJsonBin(st) {
  if (JSONBIN_BIN_ID === '69bab815c3097a1dd537f7d7') return; // not configured yet
  const payload = buildSyncPayload(st);
  try {
    const res = await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_API_KEY,
        'X-Bin-Versioning': 'false'
      },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      updateSyncBadge(payload);
      showToast('Widget synced');
    }
  } catch(e) {}
}

function updateSyncBadge(payload) {
  const el = document.getElementById('sync-badge');
  if (el) el.textContent = `Synced at ${new Date(payload.lastSync).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
}

function manualExport() {
  const payload = buildSyncPayload(state);
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = ICLOUD_FILENAME;
  a.click();
  URL.revokeObjectURL(a.href);
  updateSyncBadge(payload);
  showToast('📁 hm_progress.json saved — move to iCloud Drive');
}

let state = loadState();

// Determine current week
function getCurrentWeek() {
  const today = new Date();
  const start = new Date('2026-03-09');
  const diff = Math.floor((today - start) / (7 * 24 * 3600 * 1000));
  return Math.max(1, Math.min(36, diff + 1));
}

const currentWeek = getCurrentWeek();

// Days to race
function daysToRace() {
  const race = new Date('2026-11-14');
  const today = new Date();
  today.setHours(0,0,0,0);
  race.setHours(0,0,0,0);
  const diff = Math.round((race - today) / (24*3600*1000));
  return Math.max(0, diff);
}

function getRunKey(week, type) { return `w${week}_${type}`; }

function isChecked(week, type) { return !!state[getRunKey(week, type)]; }

function toggleRun(week, type) {
  const key = getRunKey(week, type);
  state[key] = !state[key];
  saveState(state);
  renderAll();
  showToast(state[key] ? `✓ Run logged!` : `Run unmarked`);
}

function totalRuns() { return PLAN.length * 3; }
function completedRuns() {
  return PLAN.reduce((sum, w) => {
    return sum + ['easy','tempo','long'].filter(t => isChecked(w.week, t)).length;
  }, 0);
}
function completedWeeks() {
  return PLAN.filter(w => ['easy','tempo','long'].every(t => isChecked(w.week, t))).length;
}

function updateStats() {
  const done = completedRuns();
  const total = totalRuns();
  const pct = Math.round(done / total * 100);
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-left').textContent = total - done;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('stat-weeks').textContent = completedWeeks();
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('days-left').textContent = daysToRace();
}

let currentFilter = 'all';

function filterWeeks(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function shouldShow(w) {
  const allDone = ['easy','tempo','long'].every(t => isChecked(w.week, t));
  const anyDone = ['easy','tempo','long'].some(t => isChecked(w.week, t));
  if (currentFilter === 'all') return true;
  if (currentFilter === 'current') return w.week === currentWeek;
  if (currentFilter === 'incomplete') return !allDone;
  if (currentFilter === 'done') return allDone;
  return w.phase === currentFilter || w.phase.startsWith(currentFilter);
}

function renderAll() {
  updateStats();
  const grid = document.getElementById('weeks-grid');
  const openWeeks = new Set([...grid.querySelectorAll('.week-card.open')].map(el => +el.dataset.week));
  grid.innerHTML = '';

  PLAN.forEach(w => {
    if (!shouldShow(w)) return;

    const allDone = ['easy','tempo','long'].every(t => isChecked(w.week, t));
    const isCurrent = w.week === currentWeek;
    const isOpen = openWeeks.has(w.week) || (isCurrent && openWeeks.size === 0);

    const card = document.createElement('div');
    card.className = 'week-card' + (allDone ? ' completed' : '') + (isCurrent ? ' current' : '') + (isOpen ? ' open' : '');
    card.dataset.week = w.week;

    const dots = ['easy','tempo','long'].map(t =>
      `<div class="run-dot ${isChecked(w.week, t) ? 'done' : ''}"></div>`
    ).join('');

    const phaseClass = 'phase-' + w.phase.replace(/\s+/g, '');

    card.innerHTML = `
      <div class="week-header" onclick="toggleWeek(this.closest('.week-card'))">
        <div class="week-num">${String(w.week).padStart(2,'0')}</div>
        <div class="week-dates">${w.dates}</div>
        <div class="phase-tag ${phaseClass}">${w.phase}</div>
        <div class="week-mini-progress">${dots}</div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="week-body">
        <div class="runs-grid">
          ${renderRunCard(w, 'easy', 'Easy Run', w.easy)}
          ${renderRunCard(w, 'tempo', 'Tempo / Speed', w.tempo)}
          ${renderRunCard(w, 'long', 'Long Run', w.long)}
        </div>
        <div class="week-note">${w.note}</div>
      </div>
    `;

    grid.appendChild(card);
  });
}

function renderRunCard(w, type, label, desc) {
  const checked = isChecked(w.week, type);
  return `
    <div class="run-card ${type} ${checked ? 'checked' : ''}" onclick="toggleRun(${w.week}, '${type}')">
      <div class="run-type-label">${label}</div>
      <div class="run-description">${desc}</div>
      <div class="run-check-btn">
        <div class="check-icon">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5">
            <polyline points="2 6 5 9 10 3"/>
          </svg>
        </div>
        ${checked ? 'Completed' : 'Mark complete'}
      </div>
    </div>
  `;
}

function toggleWeek(card) {
  card.classList.toggle('open');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// Initial render — open current week
renderAll();
// Auto-open current week on load
setTimeout(() => {
  const cur = document.querySelector(`.week-card[data-week="${currentWeek}"]`);
  if (cur) { cur.classList.add('open'); cur.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
}, 100);
</script>

</body>
</html>
